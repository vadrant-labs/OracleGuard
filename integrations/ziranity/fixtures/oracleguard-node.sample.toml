# OracleGuard node config — sample.
#
# Operator-supplied config consumed by the DomainHandler registered
# with Ziranity substrate dispatch. Loader is
# `oracleguard_ziranity_handler::build_disbursement_handler(path)`.
#
# Every byte-array field is lowercase hex matching the layout of the
# corresponding canonical type in `oracleguard-schemas`. See the
# `config` module docstring for the per-field specification.

[anchor]
# Policy refs the anchor gate accepts. Each entry is 64 hex chars
# (32 bytes), representing the SHA-256 of canonical policy bytes.
# The value below is the golden fixture policy_ref in this repo —
# reproducible via `sha256sum fixtures/policy_v1.canonical.bytes`.
registered_policy_refs = [
  "56a7bb9793e40aa54402ce67fcbce17dee93b6713c76ccba6c02c11f749968c2",
]

# One allocation for the MVP demo: 1_000 ADA, one authorized subject,
# ADA-denominated, one approved destination. Subject / allocation
# ids remain sentinels (0x22 / 0x33) for regression continuity with
# the byte-pair integration fixtures; the destination is a real
# Preprod address (wallet_3 — the demo receiver; see
# docs/clusters/preprod_wallets.md for the three-wallet role split).

[[registry.allocations]]
id                  = "2222222222222222222222222222222222222222222222222222222222222222"
basis_lovelace      = 1_000_000_000
authorized_subjects = [
  "3333333333333333333333333333333333333333333333333333333333333333",
]
approved_asset      = "ADA"
approved_destinations = [
  # wallet_3 (demo receiver) — addr_test1qq8wq0j9kpwkyf0tw9pa903r5wux9x6dneskyxanpt7v2w54ga88n5ff3553ugq29jyflcfmjau9e3qj093fmxw0hp7sht3w87
  { bytes_hex = "000ee03e45b05d6225eb7143d2be23a3b8629b4d9e61621bb30afcc53a95474e79d1298d291e200a2c889fe13b97785cc41279629d99cfb87d", length = 57 },
]
